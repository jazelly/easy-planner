<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weekly Task Roadmap</title>
  <link rel="stylesheet" href="./roadmap.css" />
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div>
        <h1>Weekly Roadmap</h1>
        <p class="hint">Drag cards between weeks/rows, then save versioned manifest snapshots of the layout.</p>
      </div>
      <div class="topbar-actions">
        <p class="hint">Sizes: XS=1, S=2, M=4, L=6, XL=8 weeks</p>
        <button id="save-manifest-btn" class="secondary-btn" type="button">Save</button>
        <label class="export-label" for="manifest-history-select">Previous Version</label>
        <select id="manifest-history-select" class="export-select" aria-label="Manifest history">
          <option value="">No manifests loaded</option>
        </select>
        <button id="load-manifest-btn" class="secondary-btn" type="button">Load Manifest</button>
        <button id="reset-layout-btn" class="secondary-btn" type="button">Reset Sequencing</button>
        <label class="export-label" for="export-mode">Export mode</label>
        <select id="export-mode" class="export-select" aria-label="Export mode">
          <option value="fit">Single image (fit 16:9)</option>
          <option value="slices">Multi-slice (readable 16:9)</option>
        </select>
        <button id="export-png-btn" class="export-btn" type="button">Export PNG (8K)</button>
      </div>
    </div>
    <div class="manifest-toolbar">
      <span id="manifest-status" class="manifest-status">Default target: versions folder manifests.</span>
      <a id="manifest-last-link" class="manifest-link hidden" href="#" target="_blank" rel="noopener">Open last saved manifest</a>
    </div>
    <div class="board-wrap">
      <div id="board" class="board"></div>
    </div>
    <div id="errors" class="errors hidden"></div>
  </div>

  <div id="details-backdrop" class="details-backdrop hidden" aria-hidden="true"></div>
  <aside id="details-sidebar" class="details-sidebar hidden" aria-hidden="true" aria-label="Task details">
    <div class="details-header">
      <h2 id="details-title">Task details</h2>
      <button id="details-close" class="details-close" type="button" aria-label="Close details panel">Close</button>
    </div>
    <div id="details-content" class="details-content"></div>
  </aside>
  <script src="./roadmap-data.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="./roadmap.js"></script>
</body>
</html>
